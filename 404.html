<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Co3er Development</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Fraunces:ital,opsz,wght@0,9..144,200;1,9..144,200&family=Plus+Jakarta+Sans:wght@500&display=swap" rel="stylesheet">
<style>.ep{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;gap:20px}.ec{font-family:var(--ff-mono);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--c-teal)}.eh{font-family:var(--ff-serif);font-size:clamp(3rem,8vw,6rem);font-weight:200;letter-spacing:-.04em;line-height:1}.eh em{color:var(--c-teal);font-style:italic;font-weight:700}.em{color:var(--c-muted);font-size:.95rem;max-width:380px}</style>
</head><body>
<div class="ep">
  <div class="ec">Error 404</div>
  <h1 class="eh">Page <em>not found</em></h1>
  <p class="em">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn btn-p" style="margin-top:8px">Back to Home</a>
</div></body></html>
